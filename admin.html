<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYXEN | Enterprise Resource Planning</title>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXLACoKi11HXdQ47uEL-HnIw_R-T-44vo",
            authDomain: "nyxen-official-183b6.firebaseapp.com",
            projectId: "nyxen-official-183b6",
            storageBucket: "nyxen-official-183b6.firebasestorage.app",
            messagingSenderId: "180327659657",
            appId: "1:180327659657:web:24d94b9d94bc349f232e58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- CUSTOM PROFESSIONAL NOTIFICATION ---
        window.showNotify = (msg, type = "success") => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) loadDashboard();
        });

        window.handleLogin = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { showNotify("Invalid Administrative Credentials", "error"); }
        };

        window.handleLogout = () => signOut(auth);

        window.deleteProduct = async (name) => {
            if (confirm(`Confirm deletion of ${name}?`)) {
                try {
                    await deleteDoc(doc(db, "inventory", name));
                    showNotify("Product removed from database");
                } catch (e) { showNotify(e.message, "error"); }
            }
        };

        let lastUploadedImg = "";
        window.openCloudinaryWidget = () => {
            cloudinary.openUploadWidget({
                cloudName: 'ddcjkf3ez',
                uploadPreset: 'nyxen_upload',
                sources: ['local', 'camera'],
                cropping: false,
                multiple: false
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    lastUploadedImg = result.info.secure_url;
                    document.getElementById('upload-status').innerHTML = "✅ Image Uploaded Successfully";
                    showNotify("Image linked to product");
                }
            });
        };

        window.saveProduct = async () => {
            const name = document.getElementById('p-name').value.trim();
            const price = document.getElementById('p-price').value;
            const qty = document.getElementById('p-qty').value;
            const gender = document.getElementById('p-gender').value; 

            if(!name || !price || !qty || !gender || !lastUploadedImg) {
                return showNotify("Missing Fields: Please complete all requirements", "error");
            }

            try {
                await setDoc(doc(db, "inventory", name), {
                    name, price: Number(price), qty: Number(qty),
                    img: lastUploadedImg, gender, clicks: 0, dateAdded: Date.now()
                });
                showNotify("Product Synchronized Successfully");
                lastUploadedImg = "";
                document.getElementById('upload-status').innerHTML = "";
                document.getElementById('p-form').reset();
            } catch (e) { showNotify(e.message, "error"); }
        };

        window.adjustStock = async (name, val) => {
            try { await updateDoc(doc(db, "inventory", name), { qty: increment(val) }); } 
            catch (e) { console.error(e); }
        };

        function loadDashboard() {
            onSnapshot(collection(db, "inventory"), (snap) => {
                const list = document.getElementById('product-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    list.innerHTML += `
                        <tr>
                            <td><img src="${p.img}" class="table-img"></td>
                            <td><div class="scent-name">${p.name}</div><small class="gender-tag">${p.gender}</small></td>
                            <td>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="adjustStock('${p.name}', -1)">-</button>
                                    <span>${p.qty}</span>
                                    <button class="qty-btn" onclick="adjustStock('${p.name}', 1)">+</button>
                                </div>
                            </td>
                            <td><button class="del-btn" onclick="deleteProduct('${p.name}')"><i class="fa-solid fa-trash-can"></i></button></td>
                        </tr>`;
                });
            });
        }

        window.showTab = (tab, btn) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    </script>

    <style>
        :root { --amethyst: #9b59b2; --bg: #0a0a0a; --card: #141414; --error: #e74c3c; --success: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        .toast { visibility: hidden; min-width: 280px; background-color: var(--card); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 10000; top: 30px; left: 50%; transform: translateX(-50%); border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 500; transition: 0.3s; }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        .toast.error { border-left: 5px solid var(--error); }
        .toast.success { border-left: 5px solid var(--success); }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }

        .header { border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h2 { font-weight: 700; letter-spacing: 3px; font-size: 1.1rem; margin: 0; }
        
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #222; margin-bottom: 20px; }
        h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--amethyst); margin-top: 0; margin-bottom: 20px; }

        input, select { background: #1f1f1f; border: 1px solid #333; color: white; padding: 14px; margin-bottom: 12px; width: 100%; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        select { font-size: 1rem; font-weight: 600; cursor: pointer; border: 1.5px solid #333; height: 55px; }
        input:focus, select:focus { border-color: var(--amethyst); outline: none; background: #252525; }

        .btn-upload { background: transparent; color: var(--amethyst); border: 1.5px dashed var(--amethyst); padding: 15px; border-radius: 10px; width: 100%; margin-bottom: 15px; cursor: pointer; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
        .btn-main { background: var(--amethyst); color: white; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; letter-spacing: 1px; transition: 0.3s; }

        .tab-nav { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #777; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 700; }
        .tab-btn.active { background: var(--amethyst); color: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { color: #555; text-transform: uppercase; font-size: 0.7rem; padding: 12px; border-bottom: 1px solid #222; text-align: left; }
        td { padding: 15px 12px; border-bottom: 1px solid #111; }
        .table-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .qty-btn { background: #333; border: none; color: #fff; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
        .del-btn { color: #444; background: none; border: none; cursor: pointer; font-size: 1.1rem; }
        .del-btn:hover { color: var(--error); }
        
        #upload-status { font-size: 0.75rem; text-align: center; margin-top: -10px; margin-bottom: 15px; font-weight: bold; color: var(--success); }
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="login-overlay">
        <div class="card" style="width: 100%; max-width: 340px; text-align: center; border: 1px solid var(--amethyst);">
            <h2 style="color:var(--amethyst); margin-bottom: 25px;">NYXEN <span style="font-weight:400; color:#fff;">OS</span></h2>
            <input type="email" id="admin-email" placeholder="Administrator Email">
            <input type="password" id="admin-pass" placeholder="Security Token">
            <button class="btn-main" onclick="handleLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div class="header">
        <h2>NYXEN <span style="color:var(--amethyst)">ERP</span></h2>
        <button onclick="handleLogout()" style="background:none; border:1px solid #333; color:#555; padding:6px 15px; border-radius:8px; cursor:pointer; font-size: 0.7rem; font-weight:bold;">DISCONNECT</button>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('inventory-tab', this)">INVENTORY</button>
        <button class="tab-btn" onclick="showTab('orders-tab', this)">LOGISTICS</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <div class="card">
            <h3>Product Registration</h3>
            <form id="p-form" onsubmit="event.preventDefault()">
                <input type="text" id="p-name" placeholder="Product Identity (e.g. Aventus Premium)">
                <div style="display:flex; gap:12px;">
                    <input type="number" id="p-price" placeholder="Unit Price">
                    <input type="number" id="p-qty" placeholder="Stock Level">
                </div>
                
                <button type="button" class="btn-upload" onclick="openCloudinaryWidget()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> &nbsp; Upload Product Media
                </button>
                <div id="upload-status"></div>

                <select id="p-gender">
                    <option value="" selected disabled>TARGET CLASSIFICATION</option>
                    <option value="male">MALE / MASCULINE</option>
                    <option value="female">FEMALE / FEMININE</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">SYNCHRONIZE TO SERVER</button>
            </form>
        </div>

        <div class="card" style="padding: 10px;">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Media</th><th>Identity</th><th>Quantity</th><th>Action</th></tr>
                    </thead>
                    <tbody id="product-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="orders-tab" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Active Logistics Queue</h3>
            <p style="color:#555; font-size: 0.8rem; text-align: center;">Order tracking and shipment management.</p>
        </div>
    </div>

</body>
</html>
