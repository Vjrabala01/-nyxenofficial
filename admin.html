<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCXLACoKi11HXdQ47uEL-HnIw_R-T-44vo",
        authDomain: "nyxen-official-183b6.firebaseapp.com",
        projectId: "nyxen-official-183b6",
        storageBucket: "nyxen-official-183b6.firebasestorage.app",
        messagingSenderId: "180327659657",
        appId: "1:180327659657:web:24d94b9d94bc349f232e58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- DELETE FUNCTION (FIXED) ---
    window.deleteProduct = async (name) => {
        if (confirm(`Sigurado ka ba na gusto mong i-delete ang ${name}?`)) {
            try {
                await deleteDoc(doc(db, "inventory", name));
                alert("🗑 Deleted: Scent removed from empire.");
            } catch (e) {
                alert("Error deleting: " + e.message);
            }
        }
    };

    // --- CLOUDINARY UPLOAD LOGIC ---
    window.openCloudinaryWidget = (inputId) => {
        cloudinary.openUploadWidget({
            cloudName: 'ddcjkf3ez',
            uploadPreset: 'nyxen_upload',
            sources: ['local', 'camera', 'url'],
            cropping: false, 
            multiple: false,
            showSkipCropButton: false
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById(inputId).value = result.info.secure_url;
                alert("📸 Image Ready: Original size kept!");
            }
        });
    };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
        if(user) loadDashboard();
    });

    window.handleLogin = async () => {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-pass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } 
        catch (e) { alert("Mali ang credentials, Bro!"); }
    };

    window.handleLogout = () => signOut(auth);

    // --- INVENTORY LOGIC ---
    window.saveProduct = async () => {
        const name = document.getElementById('p-name').value.trim();
        const price = document.getElementById('p-price').value;
        const qty = document.getElementById('p-qty').value;
        const img = document.getElementById('p-img').value;
        const gender = document.getElementById('p-gender').value; 

        if(!name || !price || !qty || !img) return alert("Punan lahat, Bro!");

        try {
            await setDoc(doc(db, "inventory", name), {
                name,
                price: Number(price),
                qty: Number(qty),
                img: img,
                gender: gender, 
                clicks: 0,
                dateAdded: Date.now()
            });
            alert("✅ Synced: Product is now live!");
            document.getElementById('p-form').reset();
        } catch (e) { alert("Error: " + e.message); }
    };

    window.adjustStock = async (name, val) => {
        try { await updateDoc(doc(db, "inventory", name), { qty: increment(val) }); } 
        catch (e) { console.error(e); }
    };

    // --- DASHBOARD LOADER (UPDATED BUTTON CALL) ---
    function loadDashboard() {
        onSnapshot(collection(db, "inventory"), (snap) => {
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const low = p.qty <= 5 ? 'style="color:#e67e22; font-weight:bold;"' : '';
                list.innerHTML += `
                    <tr>
                        <td><img src="${p.img}" class="table-img"></td>
                        <td><div class="scent-name">${p.name}</div><small class="gender-tag">${p.gender}</small></td>
                        <td ${low}>
                            <div class="qty-control">
                                <button class="qty-btn" onclick="adjustStock('${p.name}', -1)">-</button>
                                <span>${p.qty}</span>
                                <button class="qty-btn" onclick="adjustStock('${p.name}', 1)">+</button>
                            </div>
                        </td>
                        <td>${p.clicks || 0}</td>
                        <td><button class="del-btn" onclick="deleteProduct('${p.name}')"><i class="fa-solid fa-trash"></i></button></td>
                    </tr>`;
            });
        });

        // (The rest of your order logic remains the same...)
        onSnapshot(collection(db, "orders"), (snap) => {
            const oList = document.getElementById('order-list');
            oList.innerHTML = "";
            let rev = 0;
            snap.forEach(d => {
                const o = d.data();
                if(o.status === "Delivered") rev += Number(o.totalAmount);
                oList.innerHTML += `
                    <tr>
                        <td>#${d.id.slice(-5).toUpperCase()}</td>
                        <td>${o.customerName}</td>
                        <td>₱${o.totalAmount}</td>
                        <td><span class="status-pill ${o.status.toLowerCase()}">${o.status}</span></td>
                        <td>
                            <select class="status-select" onchange="updateOrderStatus('${d.id}', this.value)">
                                <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                <option value="Packing" ${o.status==='Packing'?'selected':''}>Packing</option>
                                <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                            </select>
                        </td>
                    </tr>`;
            });
            document.getElementById('total-rev').innerText = "₱" + rev.toLocaleString();
        });
    }

    // marketing and other functions...
    window.savePromo = async () => { /* ... existing code ... */ };
    window.updateOrderStatus = async (id, status) => { /* ... existing code ... */ };
    window.showTab = (tab) => { /* ... existing code ... */ };
</script>
