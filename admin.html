<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYXEN | Enterprise Resource Planning</title>
    
    <!-- Cloudinary Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXLACoKi11HXdQ47uEL-HnIw_R-T-44vo",
            authDomain: "nyxen-official-183b6.firebaseapp.com",
            projectId: "nyxen-official-183b6",
            storageBucket: "nyxen-official-183b6.firebasestorage.app",
            messagingSenderId: "180327659657",
            appId: "1:180327659657:web:24d94b9d94bc349f232e58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- NOTIFICATIONS ---
        window.showNotify = (msg, type = "success") => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = "toast"; }, 3000);
        };

        // --- AUTHENTICATION ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) loadDashboard();
        });

        window.handleLogin = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
                showNotify("Authenticated Successfully");
            } catch (e) { 
                showNotify("Unauthorized Access Detected", "error"); 
            }
        };

        window.handleLogout = () => signOut(auth);

        // --- MEDIA UPLOAD (CLOUDINARY) ---
        let lastUploadedImg = "";
        window.openCloudinaryWidget = () => {
            cloudinary.openUploadWidget({
                cloudName: 'ddcjkf3ez',
                uploadPreset: 'nyxen_upload', // Siguraduhin na "Unsigned" ito sa Cloudinary settings
                sources: ['local', 'camera', 'url'],
                showAdvancedOptions: false,
                cropping: false,
                multiple: false,
                defaultSource: "local"
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    lastUploadedImg = result.info.secure_url;
                    document.getElementById('upload-status').innerHTML = "✅ Media Linked: " + result.info.original_filename;
                    showNotify("Image Processed Successfully");
                }
            });
        };

        // --- PRODUCT MANAGEMENT ---
        window.saveProduct = async () => {
            const name = document.getElementById('p-name').value.trim();
            const price = document.getElementById('p-price').value;
            const qty = document.getElementById('p-qty').value;
            const gender = document.getElementById('p-gender').value; 

            if(!name || !price || !qty || !gender || !lastUploadedImg) {
                return showNotify("Missing Parameters: Image and Details Required", "error");
            }

            try {
                // Important: Field name must be 'img' to match index logic
                await setDoc(doc(db, "inventory", name), {
                    name, 
                    price: Number(price), 
                    qty: Number(qty),
                    img: lastUploadedImg, 
                    gender, 
                    clicks: 0, 
                    dateAdded: Date.now()
                });
                showNotify("Inventory Synchronized");
                lastUploadedImg = "";
                document.getElementById('upload-status').innerHTML = "";
                document.getElementById('p-form').reset();
            } catch (e) { 
                showNotify("Sync Failed: " + e.message, "error"); 
            }
        };

        window.adjustStock = async (name, val) => {
            try { 
                const productRef = doc(db, "inventory", name);
                await updateDoc(productRef, { qty: increment(val) }); 
            } catch (e) { console.error("Stock Adjust Error:", e); }
        };

        window.deleteProduct = async (name) => {
            if (confirm(`Permanently remove ${name} from inventory?`)) {
                try {
                    await deleteDoc(doc(db, "inventory", name));
                    showNotify("Resource Deleted");
                } catch (e) { showNotify(e.message, "error"); }
            }
        };

        // --- DASHBOARD REAL-TIME ---
        function loadDashboard() {
            // Inventory Table
            onSnapshot(collection(db, "inventory"), (snap) => {
                const list = document.getElementById('product-list');
                let totalHits = 0;
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    totalHits += (p.clicks || 0);
                    list.innerHTML += `
                        <tr>
                            <td><img src="${p.img || ''}" class="table-img" onerror="this.src='https://via.placeholder.com/50'"></td>
                            <td><div class="scent-name">${p.name}</div><small class="gender-tag">${p.gender}</small></td>
                            <td>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="adjustStock('${p.name}', -1)">-</button>
                                    <span style="min-width:30px; text-align:center">${p.qty}</span>
                                    <button class="qty-btn" onclick="adjustStock('${p.name}', 1)">+</button>
                                </div>
                            </td>
                            <td>${p.clicks || 0}</td>
                            <td><button class="del-btn" onclick="deleteProduct('${p.name}')"><i class="fa-solid fa-trash-can"></i></button></td>
                        </tr>`;
                });
                document.getElementById('stat-clicks').innerText = `${totalHits} Engagement`;
            });

            // Logistics Table
            onSnapshot(collection(db, "orders"), (snap) => {
                const oList = document.getElementById('order-list');
                oList.innerHTML = "";
                let rev = 0;
                snap.forEach(d => {
                    const o = d.data();
                    if(o.status === "Delivered") rev += Number(o.totalAmount);
                    oList.innerHTML += `
                        <tr>
                            <td>#${d.id.slice(-5).toUpperCase()}</td>
                            <td>${o.customerName}</td>
                            <td>₱${o.totalAmount}</td>
                            <td><span class="status-pill ${o.status.toLowerCase()}">${o.status}</span></td>
                            <td>
                                <select class="status-select" style="width:auto; padding:5px; height:auto; font-size:0.7rem;" onchange="updateOrderStatus('${d.id}', this.value)">
                                    <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                    <option value="Packing" ${o.status==='Packing'?'selected':''}>Packing</option>
                                    <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                    <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                </select>
                            </td>
                        </tr>`;
                });
                document.getElementById('total-rev').innerText = "₱" + rev.toLocaleString();
            });
        }

        // Global functions for tabs and orders
        window.showTab = (tab, btn) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        window.updateOrderStatus = async (id, status) => {
            try {
                await updateDoc(doc(db, "orders", id), { status: status });
                showNotify(`Order marked as ${status}`);
            } catch (e) { showNotify("Update failed", "error"); }
        };

    </script>

    <style>
        :root { --amethyst: #9b59b2; --bg: #0a0a0a; --card: #141414; --error: #e74c3c; --success: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* Professional Toast */
        .toast { visibility: hidden; min-width: 280px; background-color: var(--card); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 10000; top: 30px; left: 50%; transform: translateX(-50%); border: 1px solid #333; transition: 0.3s; }
        .toast.show { visibility: visible; }
        .toast.error { border-left: 5px solid var(--error); }
        .toast.success { border-left: 5px solid var(--success); }

        .header { border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h2 { font-weight: 700; letter-spacing: 3px; font-size: 1.1rem; margin: 0; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .stat-box small { color: #555; text-transform: uppercase; font-size: 0.65rem; }
        .stat-box h2 { color: var(--amethyst); margin-top: 5px; font-size: 1.1rem; }

        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #222; margin-bottom: 20px; }
        h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--amethyst); margin-bottom: 15px; }

        input, select { background: #1f1f1f; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 10px; width: 100%; border-radius: 10px; outline: none; box-sizing: border-box; }
        
        .btn-upload { background: transparent; color: var(--amethyst); border: 1.5px dashed var(--amethyst); padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--amethyst); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; }

        .tab-nav { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #777; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .tab-btn.active { background: var(--amethyst); color: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { color: #555; text-transform: uppercase; font-size: 0.6rem; padding: 10px; text-align: left; border-bottom: 1px solid #222; }
        td { padding: 10px; border-bottom: 1px solid #111; }
        .table-img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
        
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: #333; border: none; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        
        .status-pill { padding: 3px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }
        .status-pill.pending { background: #e67e2222; color: #e67e22; }
        .status-pill.delivered { background: #2ecc7122; color: var(--success); }
        
        .del-btn { color: #444; background: none; border: none; cursor: pointer; }
        .del-btn:hover { color: var(--error); }
        
        #upload-status { font-size: 0.7rem; color: var(--success); margin-bottom: 10px; font-weight: bold; }
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="login-overlay">
        <div class="card" style="width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--amethyst);">
            <h2 style="color:var(--amethyst); margin-bottom: 20px;">NYXEN <span style="font-weight:400; color:#fff;">OS</span></h2>
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div class="header">
        <h2>NYXEN <span style="color:var(--amethyst)">ERP</span></h2>
        <button onclick="handleLogout()" style="background:none; border:1px solid #333; color:#555; padding:5px 12px; border-radius:8px; cursor:pointer; font-size: 0.6rem;">LOGOUT</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><small>Revenue (Delivered)</small><h2 id="total-rev">₱0</h2></div>
        <div class="stat-box"><small>System Engagement</small><h2 id="stat-clicks">0 Engagement</h2></div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('inventory-tab', this)">INVENTORY</button>
        <button class="tab-btn" onclick="showTab('orders-tab', this)">LOGISTICS</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <div class="card">
            <h3>Add New Product</h3>
            <form id="p-form" onsubmit="event.preventDefault()">
                <input type="text" id="p-name" placeholder="Fragrance Identity">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="p-price" placeholder="Price (₱)">
                    <input type="number" id="p-qty" placeholder="Initial Stock">
                </div>
                <button type="button" class="btn-upload" onclick="openCloudinaryWidget()">
                    <i class="fa-solid fa-camera"></i> &nbsp; Select Media
                </button>
                <div id="upload-status"></div>
                <select id="p-gender">
                    <option value="" selected disabled>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">ADD TO INVENTORY</button>
            </form>
        </div>

        <div class="card" style="padding: 10px; overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Img</th><th>Product</th><th>Stock</th><th>Hits</th><th></th></tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>
    </div>

    <div id="orders-tab" class="tab-content" style="display:none;">
        <div class="card" style="padding: 10px; overflow-x: auto;">
            <h3>Active Orders</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>
    </div>

</body>
</html>
