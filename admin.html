<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYXEN | Enterprise Resource Planning</title>
    
    <!-- Cloudinary Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXLACoKi11HXdQ47uEL-HnIw_R-T-44vo",
            authDomain: "nyxen-official-183b6.firebaseapp.com",
            projectId: "nyxen-official-183b6",
            storageBucket: "nyxen-official-183b6.firebasestorage.app",
            messagingSenderId: "180327659657",
            appId: "1:180327659657:web:24d94b9d94bc349f232e58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- PROFESSIONAL NOTIFICATIONS ---
        window.showNotify = (msg, type = "success") => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.className = "toast"; }, 3000);
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) loadDashboard();
        });

        window.handleLogin = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
                showNotify("Authenticated Successfully");
            } catch (e) { 
                showNotify("Invalid Administrative Credentials", "error"); 
            }
        };

        window.handleLogout = () => signOut(auth);

        // --- MEDIA UPLOAD (CLOUDINARY) ---
        let lastUploadedImg = "";
        window.openCloudinaryWidget = () => {
            cloudinary.openUploadWidget({
                cloudName: 'ddcjkf3ez',
                uploadPreset: 'nyxen_upload', // Siguraduhin na "Unsigned" ito sa Cloudinary
                sources: ['local', 'camera', 'url'],
                multiple: false
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    lastUploadedImg = result.info.secure_url;
                    document.getElementById('upload-status').innerHTML = "✅ Media Ready for Sync";
                    showNotify("Image linked successfully");
                }
            });
        };

        // --- PRODUCT MANAGEMENT ---
        window.saveProduct = async () => {
            const name = document.getElementById('p-name').value.trim();
            const price = document.getElementById('p-price').value;
            const qty = document.getElementById('p-qty').value;
            const gender = document.getElementById('p-gender').value; 

            if(!name || !price || !qty || !gender || !lastUploadedImg) {
                return showNotify("Incomplete Data: Check all fields", "error");
            }

            // Create a compound key to prevent overwriting same name with different genders
            const docKey = `${name}_${gender}`;

            try {
                await setDoc(doc(db, "inventory", docKey), {
                    name, 
                    price: Number(price), 
                    qty: Number(qty),
                    img: lastUploadedImg, 
                    gender, 
                    clicks: 0, 
                    dateAdded: Date.now()
                });
                showNotify("Product Synchronized Successfully");
                lastUploadedImg = "";
                document.getElementById('upload-status').innerHTML = "";
                document.getElementById('p-form').reset();
            } catch (e) { showNotify(e.message, "error"); }
        };

        window.adjustStock = async (docKey, val) => {
            try { await updateDoc(doc(db, "inventory", docKey), { qty: increment(val) }); } 
            catch (e) { console.error(e); }
        };

        window.deleteProduct = async (docKey, displayName) => {
            if (confirm(`Confirm deletion of ${displayName}?`)) {
                try {
                    await deleteDoc(doc(db, "inventory", docKey));
                    showNotify("Product removed from database");
                } catch (e) { showNotify(e.message, "error"); }
            }
        };

        // --- ORDER MANAGEMENT ---
        window.updateOrderStatus = async (id, status) => {
            try {
                await updateDoc(doc(db, "orders", id), { status: status });
                showNotify(`Order status updated to ${status}`);
            } catch (e) { showNotify(e.message, "error"); }
        };

        // --- DOWNLOAD APP BANNER CLOSE ---
        window.closeDownloadBanner = () => {
            document.getElementById('download-banner').style.display = 'none';
        };

        // --- DASHBOARD DATA ---
        function loadDashboard() {
            // Inventory Stream
            onSnapshot(collection(db, "inventory"), (snap) => {
                const list = document.getElementById('product-list');
                let totalHits = 0;
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const docKey = d.id; // Target variant key
                    totalHits += (p.clicks || 0);
                    list.innerHTML += `
                        <tr>
                            <td><img src="${p.img}" class="table-img"></td>
                            <td><div class="scent-name">${p.name}</div><small class="gender-tag">${p.gender}</small></td>
                            <td>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="adjustStock('${docKey}', -1)">-</button>
                                    <span>${p.qty}</span>
                                    <button class="qty-btn" onclick="adjustStock('${docKey}', 1)">+</button>
                                </div>
                            </td>
                            <td>${p.clicks || 0}</td>
                            <td><button class="del-btn" onclick="deleteProduct('${docKey}', '${p.name} (${p.gender})')"><i class="fa-solid fa-trash-can"></i></button></td>
                        </tr>`;
                });
                document.getElementById('stat-clicks').innerText = `${totalHits} Hits`;
            });

            // Orders Stream
            onSnapshot(collection(db, "orders"), (snap) => {
                const oList = document.getElementById('order-list');
                oList.innerHTML = "";
                let rev = 0;
                snap.forEach(d => {
                    const o = d.data();
                    if(o.status === "Delivered") rev += Number(o.totalAmount);
                    oList.innerHTML += `
                        <tr>
                            <td>#${d.id.slice(-5).toUpperCase()}</td>
                            <td>${o.customerName}</td>
                            <td>₱${o.totalAmount}</td>
                            <td><span class="status-pill ${o.status.toLowerCase()}">${o.status}</span></td>
                            <td>
                                <select class="status-select" onchange="updateOrderStatus('${d.id}', this.value)">
                                    <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                    <option value="Packing" ${o.status==='Packing'?'selected':''}>Packing</option>
                                    <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                    <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                </select>
                            </td>
                        </tr>`;
                });
                document.getElementById('total-rev').innerText = "₱" + rev.toLocaleString();
            });
        }

        window.showTab = (tab, btn) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    </script>

    <style>
        :root { --amethyst: #9b59b2; --bg: #0a0a0a; --card: #141414; --error: #e74c3c; --success: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* App Download Banner Styles */
        .download-banner { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid #222; border-left: 4px solid var(--amethyst); padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85rem; }
        .download-content { display: flex; align-items: center; gap: 12px; }
        .download-content i { color: var(--amethyst); font-size: 1.2rem; }
        .download-btn { background: var(--amethyst); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; text-decoration: none; font-size: 0.75rem; transition: 0.2s; cursor: pointer; }
        .download-close { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; margin-left: 10px; }
        .download-close:hover { color: var(--error); }

        .toast { visibility: hidden; min-width: 280px; background-color: var(--card); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 10000; top: 30px; left: 50%; transform: translateX(-50%); border: 1px solid #333; transition: 0.3s; font-weight: bold; }
        .toast.show { visibility: visible; }
        .toast.error { border-left: 5px solid var(--error); }
        .toast.success { border-left: 5px solid var(--success); }

        .header { border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h2 { font-weight: 700; letter-spacing: 3px; font-size: 1.1rem; margin: 0; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .stat-box small { color: #555; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; }
        .stat-box h2 { color: var(--amethyst); margin-top: 5px; font-size: 1.2rem; }

        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #222; margin-bottom: 20px; }
        h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--amethyst); margin-top: 0; margin-bottom: 20px; }

        input, select { background: #1f1f1f; border: 1px solid #333; color: white; padding: 14px; margin-bottom: 12px; width: 100%; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; outline: none; }
        
        .btn-upload { background: transparent; color: var(--amethyst); border: 1.5px dashed var(--amethyst); padding: 15px; border-radius: 10px; width: 100%; margin-bottom: 15px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .btn-main { background: var(--amethyst); color: white; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; letter-spacing: 1px; }

        .tab-nav { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #777; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.75rem; }
        .tab-btn.active { background: var(--amethyst); color: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { color: #555; text-transform: uppercase; font-size: 0.65rem; padding: 12px; border-bottom: 1px solid #222; text-align: left; }
        td { padding: 15px 12px; border-bottom: 1px solid #111; }
        .table-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .qty-control { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #333; border: none; color: #fff; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .status-pill.pending { background: #e67e2222; color: #e67e22; }
        .status-pill.delivered { background: #2ecc7122; color: var(--success); }
        .status-select { width: auto; padding: 5px; height: auto; font-size: 0.7rem; margin: 0; }
        
        .del-btn { color: #444; background: none; border: none; cursor: pointer; font-size: 1.1rem; }
        #upload-status { font-size: 0.75rem; text-align: center; margin-bottom: 15px; font-weight: bold; color: var(--success); }
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="login-overlay">
        <div class="card" style="width: 100%; max-width: 340px; text-align: center; border: 1px solid var(--amethyst);">
            <h2 style="color:var(--amethyst); margin-bottom: 25px;">NYXEN <span style="font-weight:400; color:#fff;">OS</span></h2>
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <!-- App Download Prompt Banner -->
    <div id="download-banner" class="download-banner">
        <div class="download-content">
            <i class="fa-solid fa-mobile-screen-button"></i>
            <span>Get the optimized mobile experience. Download the <strong>NYXEN App</strong>.</span>
        </div>
        <div style="display: flex; align-items: center;">
            <a href="#" class="download-btn">DOWNLOAD</a>
            <button class="download-close" onclick="closeDownloadBanner()"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <div class="header">
        <h2>NYXEN <span style="color:var(--amethyst)">ERP</span></h2>
        <button onclick="handleLogout()" style="background:none; border:1px solid #333; color:#555; padding:6px 15px; border-radius:8px; cursor:pointer; font-size: 0.7rem; font-weight:bold;">LOGOUT</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><small>Total Revenue</small><h2 id="total-rev">₱0</h2></div>
        <div class="stat-box"><small>Engagement</small><h2 id="stat-clicks">0 Hits</h2></div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('inventory-tab', this)">INVENTORY</button>
        <button class="tab-btn" onclick="showTab('orders-tab', this)">LOGISTICS</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <div class="card">
            <h3>Product Registration</h3>
            <form id="p-form" onsubmit="event.preventDefault()">
                <input type="text" id="p-name" placeholder="Product Identity">
                <div style="display:flex; gap:12px;">
                    <input type="number" id="p-price" placeholder="Price">
                    <input type="number" id="p-qty" placeholder="Stock">
                </div>
                <button type="button" class="btn-upload" onclick="openCloudinaryWidget()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> &nbsp; Upload Product Media
                </button>
                <div id="upload-status"></div>
                <select id="p-gender">
                    <option value="" selected disabled>Target Classification</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">SYNCHRONIZE TO SERVER</button>
            </form>
        </div>

        <div class="card" style="padding: 10px; overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Media</th><th>Identity</th><th>Quantity</th><th>Hits</th><th>Action</th></tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>
    </div>

    <div id="orders-tab" class="tab-content" style="display:none;">
        <div class="card" style="padding: 10px; overflow-x: auto;">
            <h3>Active Shipment Queue</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Operation</th></tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>
    </div>

</body>
</html>
