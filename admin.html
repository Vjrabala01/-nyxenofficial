<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYXEN | Master Empire Admin</title>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXLACoKi11HXdQ47uEL-HnIw_R-T-44vo",
            authDomain: "nyxen-official-183b6.firebaseapp.com",
            projectId: "nyxen-official-183b6",
            storageBucket: "nyxen-official-183b6.firebasestorage.app",
            messagingSenderId: "180327659657",
            appId: "1:180327659657:web:24d94b9d94bc349f232e58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) loadDashboard();
        });

        window.handleLogin = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert("Mali ang credentials, Bro!"); }
        };

        window.handleLogout = () => signOut(auth);

        // --- DELETE FUNCTION ---
        window.deleteProduct = async (name) => {
            if (confirm(`Sigurado ka bang buburahin ang ${name}?`)) {
                try {
                    await deleteDoc(doc(db, "inventory", name));
                    alert("🗑 Removed from Empire!");
                } catch (e) { alert("Error: " + e.message); }
            }
        };

        // --- CLOUDINARY ---
        window.openCloudinaryWidget = (inputId) => {
            cloudinary.openUploadWidget({
                cloudName: 'ddcjkf3ez',
                uploadPreset: 'nyxen_upload',
                sources: ['local', 'camera', 'url'],
                cropping: false,
                multiple: false
            }, (error, result) => {
                if (!error && result && result.event === "success") {
                    document.getElementById(inputId).value = result.info.secure_url;
                    alert("📸 Image Ready!");
                }
            });
        };

        // --- INVENTORY ---
        window.saveProduct = async () => {
            const name = document.getElementById('p-name').value.trim();
            const price = document.getElementById('p-price').value;
            const qty = document.getElementById('p-qty').value;
            const img = document.getElementById('p-img').value;
            const gender = document.getElementById('p-gender').value; 

            if(!name || !price || !qty || !img) return alert("Punan lahat, Bro!");

            try {
                await setDoc(doc(db, "inventory", name), {
                    name, price: Number(price), qty: Number(qty),
                    img, gender, clicks: 0, dateAdded: Date.now()
                });
                alert("✅ Synced!");
                document.getElementById('p-form').reset();
            } catch (e) { alert("Error: " + e.message); }
        };

        window.adjustStock = async (name, val) => {
            try { await updateDoc(doc(db, "inventory", name), { qty: increment(val) }); } 
            catch (e) { console.error(e); }
        };

        // --- MARKETING ---
        window.savePromo = async () => {
            const img = document.getElementById('promo-img').value;
            const end = document.getElementById('promo-end').value;
            const disc = document.getElementById('promo-perc').value;
            const local = document.getElementById('promo-local').checked;
            if(!img) return alert("Banner missing!");
            try {
                await setDoc(doc(db, "settings", "flash-sale"), { 
                    promoImg: img, endTime: end, discount: disc, active: true, localQuick: local 
                });
                alert("🚀 Campaign Live!");
            } catch (e) { alert("Error: " + e.message); }
        };

        // --- ORDERS ---
        window.updateOrderStatus = async (id, status) => {
            let updateData = { status: status };
            if (status === "Shipped") {
                const track = prompt("J&T Tracking:");
                if(track) updateData.tracking = track;
            }
            await updateDoc(doc(db, "orders", id), updateData);
            alert("Updated!");
        };

        // --- DASHBOARD LOADER ---
        function loadDashboard() {
            onSnapshot(collection(db, "inventory"), (snap) => {
                const list = document.getElementById('product-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const low = p.qty <= 5 ? 'style="color:#e67e22; font-weight:bold;"' : '';
                    list.innerHTML += `
                        <tr>
                            <td><img src="${p.img}" class="table-img"></td>
                            <td><div class="scent-name">${p.name}</div><small class="gender-tag">${p.gender}</small></td>
                            <td ${low}>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="adjustStock('${p.name}', -1)">-</button>
                                    <span>${p.qty}</span>
                                    <button class="qty-btn" onclick="adjustStock('${p.name}', 1)">+</button>
                                </div>
                            </td>
                            <td>${p.clicks || 0}</td>
                            <td><button class="del-btn" onclick="deleteProduct('${p.name}')"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>`;
                });
            });

            onSnapshot(collection(db, "orders"), (snap) => {
                const oList = document.getElementById('order-list');
                oList.innerHTML = "";
                let rev = 0;
                snap.forEach(d => {
                    const o = d.data();
                    if(o.status === "Delivered") rev += Number(o.totalAmount);
                    oList.innerHTML += `
                        <tr>
                            <td>#${d.id.slice(-5).toUpperCase()}</td>
                            <td>${o.customerName}</td>
                            <td>₱${o.totalAmount}</td>
                            <td><span class="status-pill ${o.status.toLowerCase()}">${o.status}</span></td>
                            <td>
                                <select class="status-select" onchange="updateOrderStatus('${d.id}', this.value)">
                                    <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                    <option value="Packing" ${o.status==='Packing'?'selected':''}>Packing</option>
                                    <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                    <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                </select>
                            </td>
                        </tr>`;
                });
                document.getElementById('total-rev').innerText = "₱" + rev.toLocaleString();
            });
        }

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
        };
    </script>

    <style>
        :root { --amethyst: #9b59b2; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .tab-nav { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 100px; background: #222; border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }
        .tab-btn.active { background: var(--amethyst); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 10px; width: 100%; border-radius: 8px; outline: none; }
        .btn-upload { background: #333; color: #9b59b2; border: 1px dashed #9b59b2; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; cursor: pointer; }
        .btn-main { background: var(--amethyst); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; font-size: 0.8rem; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #222; }
        .table-img { width: 35px; height: 35px; border-radius: 5px; object-fit: cover; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: #333; border: none; color: white; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; }
        .status-pill { padding: 4px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: bold; }
        .status-pill.pending { background: #e67e22; }
        .status-pill.shipped { background: #9b59b2; }
        .status-pill.delivered { background: #2ecc71; }
        .del-btn { color: #e74c3c; background: none; border: none; cursor: pointer; font-size: 1rem; }
        #login-overlay { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="login-overlay">
        <div class="card" style="width: 100%; max-width: 320px; text-align: center;">
            <h2 style="color:var(--amethyst); margin-bottom: 20px;">NYXEN ADMIN</h2>
            <input type="email" id="admin-email" placeholder="Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">ACCESS EMPIRE</button>
        </div>
    </div>

    <div class="header">
        <h2>NYXEN <span style="color:var(--amethyst)">ADMIN</span></h2>
        <button onclick="handleLogout()" style="background:none; border:1px solid #444; color:#888; padding:5px 12px; border-radius:5px; cursor:pointer;">Logout</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><small>Total Revenue</small><h2 id="total-rev">₱0</h2></div>
        <div class="stat-box"><small>Engagement</small><h2 id="stat-clicks">0 Hits</h2></div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('inventory-tab')">INVENTORY</button>
        <button class="tab-btn" onclick="showTab('orders-tab')">ORDERS</button>
        <button class="tab-btn" onclick="showTab('promo-tab')">MARKETING</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <div class="card">
            <h3>Add New Scent</h3>
            <form id="p-form" onsubmit="event.preventDefault()">
                <input type="text" id="p-name" placeholder="Name">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="p-price" placeholder="Price">
                    <input type="number" id="p-qty" placeholder="Qty">
                </div>
                <button type="button" class="btn-upload" onclick="openCloudinaryWidget('p-img')">📸 Upload Image</button>
                <input type="text" id="p-img" placeholder="Image URL">
                <select id="p-gender">
                    <option value="male">MALE</option>
                    <option value="female">FEMALE</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">SYNC TO WEBSITE</button>
            </form>
        </div>

        <div class="card">
            <div class="table-container">
                <table>
                    <thead><tr><th>Img</th><th>Scent</th><th>Qty</th><th>Hits</th><th></th></tr></thead>
                    <tbody id="product-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="orders-tab" class="tab-content" style="display:none;">
        <div class="card">
            <div class="table-container">
                <table>
                    <thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="order-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="promo-tab" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Marketing Campaign</h3>
            <button type="button" class="btn-upload" onclick="openCloudinaryWidget('promo-img')">🖼 Upload Promo Banner</button>
            <input type="text" id="promo-img" placeholder="Banner URL">
            <input type="datetime-local" id="promo-end">
            <input type="number" id="promo-perc" placeholder="Discount %">
            <label><input type="checkbox" id="promo-local"> Enable Negros Delivery Banner</label>
            <button class="btn-main" onclick="savePromo()">ACTIVATE</button>
        </div>
    </div>

</body>
</html>
